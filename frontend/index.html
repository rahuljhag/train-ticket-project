<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailShare - Ticket Matching</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h1 { color: #d32f2f; margin-bottom: 10px; }
        p { color: #555; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; /* padding fix */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background-color: #b71c1c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚆 RailShare</h1>
        <p>Smart Ticket Matching System</p>
        
        <input type="text" placeholder="From (Source)">
        <input type="text" placeholder="To (Destination)">
        <input type="date">
        
        <button onclick="alert('Searching for matches...')">Search Tickets</button>
    </div>

</body>
</html>
